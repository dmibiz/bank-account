services:
  bank-account:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATASOURCE_URL_DEV: jdbc:postgresql://db:5432/bank-account
      DATASOURCE_USERNAME_DEV: postgres
      DATASOURCE_PASSWORD_DEV: postgres
    depends_on:
      - db

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: bank-account
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: